<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
</head>
<body style="text-align:center; background:black; color:white;">

<h2>Snake Game 🐍</h2>
<canvas id="c" width="400" height="400" style="background:white;"></canvas>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");

let snake = [{x:10, y:10}];
let dx = 1;
let dy = 0;
let food = {x:5, y:5};

document.addEventListener("keydown", (e)=>{
  if(e.key=="ArrowUp"){dx=0;dy=-1;}
  if(e.key=="ArrowDown"){dx=0;dy=1;}
  if(e.key=="ArrowLeft"){dx=-1;dy=0;}
  if(e.key=="ArrowRight"){dx=1;dy=0;}
});

function game(){
  ctx.clearRect(0,0,400,400);

  // move snake
  let head = {x: snake[0].x + dx, y: snake[0].y + dy};

  // eat food
  if(head.x==food.x && head.y==food.y){
    food = {
      x: Math.floor(Math.random()*20),
      y: Math.floor(Math.random()*20)
    };
  } else {
    snake.pop();
  }

  snake.unshift(head);

  // draw snake
  ctx.fillStyle="green";
  snake.forEach(s=>{
    ctx.fillRect(s.x*20, s.y*20, 20, 20);
  });

  // draw food
  ctx.fillStyle="red";
  ctx.fillRect(food.x*20, food.y*20, 20, 20);

  // wall collision
  if(head.x<0 || head.y<0 || head.x>=20 || head.y>=20){
    alert("Game Over 🎂");
    snake=[{x:10,y:10}];
  }
}

setInterval(game,150);
</script>

</body>
</html>
